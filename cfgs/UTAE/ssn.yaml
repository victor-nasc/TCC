# Stochastic Segmentation Network (SSN) — UTAE backbone + low-rank multivariate
# Gaussian over the logit map for spatially correlated aleatoric uncertainty.
# Reference: Monteiro et al., "Stochastic Segmentation Networks", NeurIPS 2020.
#
# Key hyperparameters to tune:
#   ssn_rank       — rank of the covariance factor (paper: 10). Higher rank can
#                    capture more complex spatial correlation modes.
#   ssn_mc_samples — MC samples for the likelihood estimate during training
#                    (paper: 20). More samples = lower-variance loss estimate.
#   ssn_samples    — logit-map samples at test time; probability maps are
#                    averaged and their variance reported as aleatoric
#                    uncertainty.
#
# The SSN training loss is inherently a per-pixel BCE likelihood
# (pos_class_weight-weighted); loss_function only affects val/test loss logging.
seed_everything: 0
optimizer:
  class_path: torch.optim.AdamW
  init_args:
    lr: 0.01
model:
  class_path: SSNLightning
  init_args:
    n_channels: 40
    flatten_temporal_dimension: false
    pos_class_weight: 10
    loss_function: "BCE"
    ssn_rank: 10           # covariance factor rank
    ssn_mc_samples: 20     # MC samples for the training likelihood
    ssn_samples: 16        # logit-map samples at test time
do_train: true
do_test: true
do_predict: false
