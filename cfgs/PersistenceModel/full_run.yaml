seed_everything: 0
optimizer:
  class_path: torch.optim.AdamW
  init_args:
    lr: 0.001

model:
  class_path: PersistenceModel
  init_args:
    n_channels: 40
    flatten_temporal_dimension: false
    pos_class_weight: 1.0
    loss_function: "BCE"
    use_all_detections: true  # predict using the binary active fire mask from the last timestep

do_train: false
do_test: true
do_predict: false
